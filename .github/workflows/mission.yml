name: TITAN_MISSION
on: [workflow_dispatch]
jobs:
  run:
    runs-on: self-hosted
    steps:
      - name: Install and Exec
        run: |
          if [ ! -f "./nuclei" ]; then
            echo "Fetching binary..."
            # Using the direct release asset URL
            curl -L "https://github.com/projectdiscovery/nuclei/releases/download/v3.3.0/nuclei_3.3.0_linux_amd64.zip" -o nuclei.zip
            unzip -o nuclei.zip
          fi
          ./nuclei -version
          ./nuclei -target https://pay.wallet.tg -t cves/ -t exposures/
