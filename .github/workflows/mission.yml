name: TITAN_MISSION
on: [workflow_dispatch]
jobs:
  run:
    runs-on: self-hosted
    steps:
      - name: Path Diagnostic
        run: |
          set -e
          echo "Scanning: https://pay.wallet.tg"
          # Ensure clean environment
          rm -f nuclei
          # Direct download
          curl -L "https://github.com/projectdiscovery/nuclei/releases/download/v3.3.0/nuclei_3.3.0_linux_amd64.zip" -o nuclei.zip
          unzip -o nuclei.zip
          # Check if binary is where we expect
          if [ -f "nuclei" ]; then
            chmod +x ./nuclei
            ./nuclei -target https://pay.wallet.tg -t cves/ -t exposures/
          else
            echo "Binary extraction failed"
            ls -F
            exit 1
          fi
