name: TITAN_MISSION
on: [workflow_dispatch]
jobs:
  run:
    runs-on: self-hosted
    steps:
      - name: Install and Exec
        run: |
          # Detect if nuclei is present, if not, fetch it
          if [ ! -f "./nuclei" ]; then
            echo "Binary missing. Fetching latest nuclei..."
            curl -L https://github.com/projectdiscovery/nuclei/releases/latest/download/nuclei_linux_amd64.zip -o nuclei.zip
            unzip -o nuclei.zip
          fi
          ./nuclei -target https://pay.wallet.tg -t cves/ -t exposures/
