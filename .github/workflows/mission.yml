name: TITAN_MISSION
on: [workflow_dispatch]
jobs:
  run:
    runs-on: self-hosted
    steps:
      - name: Install and Run Nuclei
        run: |
          if [ ! -f ./nuclei ]; then
            curl -L https://github.com/projectdiscovery/nuclei/releases/latest/download/nuclei_linux_amd64.zip -o nuclei.zip
            unzip nuclei.zip
          fi
          ./nuclei -target https://pay.wallet.tg -severity critical
