name: TITAN_MISSION
on: [workflow_dispatch]
jobs:
  run:
    runs-on: self-hosted
    steps:
      - name: Exec
        run: |
          # Go to the workspace directory
          cd $GITHUB_WORKSPACE
          # Force overwrite of binary if it exists, use -o for unzip
          if [ ! -f "./nuclei" ]; then
             unzip -o nuclei.zip
          fi
          # Execute with explicit path
          ./nuclei -target https://pay.wallet.tg -t cves/ -t exposures/ -verbose
