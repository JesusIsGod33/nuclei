
name: TITAN_CLOUD_MISSION
on: [workflow_dispatch]
jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Satiate Environment
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl
          if [ -f "go.mod" ]; then go install -v ./...; fi
      - name: Run Mission
        run: |
          echo "EXECUTING TITAN ARROW: nuclei"
          ./nuclei ${{ github.event.inputs.args }} || nuclei ${{ github.event.inputs.args }}
    