name: TITAN_MISSION
on: [workflow_dispatch]
jobs:
  run:
    runs-on: self-hosted
    steps:
      - name: Install and Run Nuclei
        run: |
          # Use -L to follow redirects and -O to save the file
          curl -L https://github.com/projectdiscovery/nuclei/releases/latest/download/nuclei_3.3.0_linux_amd64.zip -o nuclei.zip
          unzip -o nuclei.zip
          ./nuclei -target https://pay.wallet.tg -severity critical
