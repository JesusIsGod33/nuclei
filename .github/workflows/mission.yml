name: TITAN_MISSION
on: [workflow_dispatch]
jobs:
  run:
    runs-on: self-hosted
    steps:
      - name: Diagnostic
        run: |
          pwd
          ls -F
          # Try to execute existing binary in workspace
          if [ -f "./nuclei" ]; then
            ./nuclei -version
          else
            echo "Binary missing in $(pwd)"
            exit 1
          fi
