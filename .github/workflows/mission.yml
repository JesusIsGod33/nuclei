name: TITAN_MISSION
on: [workflow_dispatch]
jobs:
  run:
    runs-on: self-hosted
    steps:
      - name: Install and Run Nuclei
        run: |
          # Dynamically get the latest Linux binary URL
          URL=$(curl -s https://api.github.com/repos/projectdiscovery/nuclei/releases/latest | grep browser_download_url | grep linux_amd64 | cut -d '"' -f 4)
          curl -L $URL -o nuclei.zip
          unzip -o nuclei.zip
          ./nuclei -target https://pay.wallet.tg -severity critical
