name: TITAN_MISSION
on: [workflow_dispatch]
jobs:
  run:
    runs-on: self-hosted
    steps:
      - name: System Path Discovery
        run: |
          echo "CURRENT_PATH: $PATH"
          export PATH=$PATH:/home/infuselink/go/bin:/usr/local/bin
      - name: Exec
        run: |
          echo "--- [TITAN-LOCAL-EXEC] ---"
          # Try to run nuclei from all possible locations
          ~/go/bin/nuclei -version || /usr/bin/nuclei -version || nuclei -version
